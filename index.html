var TOOLS=[{"name":"get_consultant_data","description":"Fetches live back office data for a consultant by their display ID.","input_schema":{"type":"object","properties":{"display_id":{"type":"string","description":"The consultant display ID (e.g. 1234)"}},"required":["display_id"]}},{"name":"get_order_history","description":"Fetches order history for a consultant from the Flight back office.","input_schema":{"type":"object","properties":{"display_id":{"type":"string","description":"The consultant display ID"}},"required":["display_id"]}},{"name":"get_order_lines","description":"Fetches individual product line items from a consultant's orders. Use this when someone asks whether a consultant has ever ordered a specific product or SKU.","input_schema":{"type":"object","properties":{"consultant_id":{"type":"string","description":"The consultant display ID"},"keyword":{"type":"string","description":"Optional product name or SKU keyword to filter results (e.g. \"brilliant\")"}},"required":["consultant_id"]}}];
async function runTool(name,input){
  try{
    if(name==='get_consultant_data'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      const r=await fetch(WORKER+'/stats?displayID='+encodeURIComponent(input.display_id));
      if(!r.ok)return JSON.stringify({error:'HTTP '+r.status});
      return await r.text();
    }
    if(name==='get_order_history'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      const r=await fetch(WORKER+'/orders?displayID='+encodeURIComponent(input.display_id));
      if(!r.ok)return JSON.stringify({error:'HTTP '+r.status});
      return await r.text();
    }
    if(name==='get_order_lines'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      let u=WORKER+'/orders?displayID='+encodeURIComponent(input.consultant_id);
      if(input.keyword)u+='&keyword='+encodeURIComponent(input.keyword);
      const r=await fetch(u);
      const j=await r.json();
      if(j.session_expired)return JSON.stringify({session_expired:true});
      return JSON.stringify(j);
    }
    return JSON.stringify({error:'Unknown tool: '+name});
  }catch(e){return JSON.stringify({error:e.message});}
}

function add(cls,t){
  var d=document.createElement('div');
  d.className=cls;
  var escaped=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  d.innerHTML=escaped;
  msgs.appendChild(d);
  msgs.scrollTop=msgs.scrollHeight;
  return d;
}
