<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d0f;color:#eee;font:14px/1.5 sans-serif;overflow:hidden}
#wrap{display:flex;flex-direction:column;height:100%}
#hd{background:#131316;border-bottom:1px solid #1e1e24;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#ic{width:30px;height:30px;background:linear-gradient(135deg,#c9a84c,#8a6620);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
#nm{font-weight:900;letter-spacing:.1em;font-size:1rem}
#sb{font-size:.65rem;color:#666;letter-spacing:.1em}
#msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.u{align-self:flex-end;background:#c9a84c;color:#000;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:75%;word-wrap:break-word}
.a{align-self:flex-start;background:#1a1a22;border:1px solid #222;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:75%;white-space:pre-wrap;word-wrap:break-word}
#bar{display:flex;gap:8px;padding:10px;background:#111;border-top:1px solid #222;flex-shrink:0}
#inp{flex:1;background:#1a1a1a;color:#eee;border:1px solid #333;border-radius:8px;padding:8px;font:inherit;outline:none}
#inp:focus{border-color:#c9a84c}
#btn{background:#c9a84c;color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:16px}
#btn:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<div id=wrap>
<div id=hd>
  <div id=ic>&#10022;</div>
  <div>
    <div id=nm>FLIGHT</div>
    <div id=sb>JACK WINN PRO &middot; VIRTUAL UPLINE</div>
  </div>
</div>
<div id=msgs></div>
<div id=bar>
  <input id=inp placeholder="Ask Flight anything…" autocomplete=off>
  <button id=btn>&#8593;</button>
</div>
</div>
<script>
var K='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';
var P='You are Flight, the AI virtual upline for Jack Winn Pro — a professional hair care network marketing company for stylists. Help associates with product language, prospecting scripts, social media posts, and rank advancement. Rank ladder: QBA→TL→STL→ETL→Director→Senior Director→Executive Director. Be warm, direct, and always give something actionable — scripts, posts, or a clear next step. When asked for content, write it out fully so they can copy and paste it immediately.';
var H=[];
var msgs=document.getElementById('msgs');
var inp=document.getElementById('inp');
var btn=document.getElementById('btn');
function add(cls,t){var d=document.createElement('div');d.className=cls;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;}
async function go(){var t=inp.value.trim();if(!t||btn.disabled)return;inp.value='';add('u',t);H.push({role:'user',content:t});var w=add('a','✶ thinking…');btn.disabled=true;try{var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':K,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system:P,messages:H})});var d=await r.json();var a=d.content[0].text;w.textContent=a;H.push({role:'assistant',content:a});}catch(e){w.textContent='Error: '+e.message;}btn.disabled=false;inp.focus();}
btn.onclick=go;
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
add('a',"Hey! I'm Flight — your virtual upline, available 24/7.\n\nAsk me for prospecting scripts, social media posts, product language, or help hitting your next rank. What do you need today?");
inp.focus();
</script>
</body>
</html>
