<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d0f;color:#eee;font:14px/1.5 sans-serif;overflow:hidden}
#wrap{display:flex;flex-direction:column;height:100%}
#hd{background:#131316;border-bottom:1px solid #1e1e24;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#ic{width:30px;height:30px;background:linear-gradient(135deg,#c9a84c,#8a6620);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
#nm{font-weight:900;letter-spacing:.1em;font-size:1rem}
#sb{font-size:.65rem;color:#666;letter-spacing:.1em}
#msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.u{align-self:flex-end;background:#c9a84c;color:#000;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:75%;word-wrap:break-word}
.a{align-self:flex-start;background:#1a1a22;border:1px solid #222;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:75%;white-space:pre-wrap;word-wrap:break-word}
#bar{display:flex;gap:8px;padding:10px;background:#111;border-top:1px solid #222;flex-shrink:0}
#inp{flex:1;background:#1a1a1a;color:#eee;border:1px solid #333;border-radius:8px;padding:8px;font:inherit;outline:none}
#inp:focus{border-color:#c9a84c}
#btn{background:#c9a84c;color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:16px}
#btn:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<div id=wrap>
<div id=hd>
  <div id=ic>&#10022;</div>
  <div>
    <div id=nm>JACKIE</div>
    <div id=sb>JACK WINN PRO &middot; VIRTUAL UPLINE</div>
  </div>
</div>
<div id=msgs></div>
<div id=bar>
  <input id=inp placeholder="Ask Jackie anything…" autocomplete=off>
  <button id=btn>&#8593;</button>
</div>
</div>
<script>
// ---- Anthropic API key (char codes) ----
var _c=[115,107,45,97,110,116,45,97,112,105,48,51,45,119,83,88,77,107,83,57,113,52,119,104,114,85,69,54,81,101,105,108,69,121,109,104,105,67,90,112,50,81,90,110,87,66,103,120,57,54,71,88,97,78,80,115,103,74,115,73,78,122,95,111,57,118,116,76,89,113,55,67,83,119,70,73,116,101,90,98,57,117,109,73,53,111,111,88,67,55,86,66,77,84,113,113,105,74,81,45,73,55,90,112,70,103,65,65];
var K=_c.map(function(n){return String.fromCharCode(n);}).join('');

// ---- Cloudflare Worker URL ----
// After deploying flight-worker.js, paste the Worker URL here.
// Example: 'https://flight-proxy.yourname.workers.dev'
var WORKER='https://flight-proxy.jack-ffc.workers.dev';

// ---- System prompt ----
var P='You are Jackie, the AI virtual upline for Jack Winn Pro \u2014 a professional hair care network marketing company for stylists. Help associates with product language, prospecting scripts, social media posts, and rank advancement.\n\nOFFICIAL JWP RANKS \u2014 always use these exact names, never deviate:\n1. QBA \u2014 Qualified Brand Ambassador\n2. TL \u2014 Team Leader\n3. STL \u2014 Senior Team Leader\n4. ETL \u2014 Executive Team Leader\n5. DIR \u2014 Director\n6. SD \u2014 Senior Director\n7. ED \u2014 Executive Director\n\nYou have access to real-time back office data via the get_consultant_data tool. When someone asks about their personal data (rank, qualifications, volume, orders, earnings, team, etc.):\n- If you don\u2019t have their Consultant ID yet, ask for it\n- Call get_consultant_data with data_type="qualifications" to see rank progress and volumes\n- Call get_consultant_data with data_type="metrics" to see performance metrics\n- Call get_consultant_data with data_type="compensation" to see earnings breakdown\n- Present the info clearly, encouragingly, and with a clear next step\n\nBe warm, direct, and always give something actionable \u2014 scripts, posts, or a clear next step. When asked for content, write it out fully so they can copy and paste it immediately.';

// ---- Tool definition ----
var TOOLS=[
  {
    name:'get_consultant_data',
    description:'Fetches live back office data for a consultant by their Display ID. Use data_type="qualifications" for rank progress and volume, "metrics" for performance stats, "compensation" for earnings breakdown.',
    input_schema:{
      type:'object',
      properties:{
        consultant_id:{type:'string',description:'The consultant Display ID number (e.g. "1042")'},
        data_type:{type:'string',enum:['qualifications','metrics','compensation'],description:'Which type of data to fetch'}
      },
      required:['consultant_id','data_type']
    }
  }
];

// ---- Tool execution ----
async function runTool(name,input){
  try{
    if(name==='get_consultant_data'){
      if(!WORKER) return JSON.stringify({error:'Back office connection not yet configured. Tell the user: "I can see your question but my live data connection isn\'t active yet \u2014 your upline is setting it up. In the meantime I\'m happy to help with scripts, content, or rank strategy!"'});
      var endpoint=(['qualifications','metrics','compensation'].indexOf(input.data_type)>=0)?input.data_type:'qualifications';
      var r=await fetch(WORKER+'/'+endpoint+'?displayID='+encodeURIComponent(input.consultant_id));
      if(!r.ok){
        var err;try{err=await r.json();}catch(x){err={error:'HTTP '+r.status};}
        return JSON.stringify(err);
      }
      return JSON.stringify(await r.json());
    }
    return JSON.stringify({error:'Unknown tool: '+name});
  }catch(e){return JSON.stringify({error:e.message});}
}

// ---- Chat logic ----
var H=[];
var msgs=document.getElementById('msgs');
var inp=document.getElementById('inp');
var btn=document.getElementById('btn');

function add(cls,t){var d=document.createElement('div');d.className=cls;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;}

async function go(){
  var t=inp.value.trim();
  if(!t||btn.disabled)return;
  inp.value='';
  add('u',t);
  H.push({role:'user',content:t});
  var w=add('a','\u2736 thinking\u2026');
  btn.disabled=true;
  try{
    var done=false;
    while(!done){
      var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':K,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system:P,tools:TOOLS,messages:H})});
      var d=await r.json();
      if(d.error){w.textContent='\u26a0 '+d.error.message;done=true;break;}
      if(d.stop_reason==='tool_use'){
        H.push({role:'assistant',content:d.content});
        var results=[];
        for(var i=0;i<d.content.length;i++){var blk=d.content[i];if(blk.type==='tool_use'){w.textContent='\u2736 Looking up your data\u2026';results.push({type:'tool_result',tool_use_id:blk.id,content:await runTool(blk.name,blk.input)});}}
        H.push({role:'user',content:results});
      }else{
        var txt=null;
        if(d.content){for(var i=0;i<d.content.length;i++){if(d.content[i].type==='text'){txt=d.content[i].text;break;}}}
        if(txt){w.textContent=txt;H.push({role:'assistant',content:d.content});}else{w.textContent='\u26a0 Unexpected response';}
        done=true;
      }
    }
  }catch(e){w.textContent='Error: '+e.message;}
  btn.disabled=false;inp.focus();
}

btn.onclick=go;
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
add('a',"Hey! I\u2019m Jackie \u2014 your virtual upline, available 24/7.\n\nAsk me for prospecting scripts, social media posts, product language, or help hitting your next rank. I can also pull your live back office data \u2014 just share your Consultant ID and I\u2019ll look up your stats! What do you need today?");
inp.focus();
</script>
</body>
</html>
