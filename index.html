<!DOCTYPE html>
<html>
<head>
<meta charset=UTF-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0d0d0f;color:#eee;font:14px/1.5 sans-serif;overflow:hidden}
#wrap{display:flex;flex-direction:column;height:100%}
#hd{background:#131316;border-bottom:1px solid #1e1e24;padding:10px 14px;dishplay:flex;align-items:center;gap:10px;flex-shrink:0}
#ic{width:30px;height:30px;background:linear-gradient(135deg,#c9a84c,#8a6620);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
#nm{font-weight:900;letter-spacing:.1em;font-size:1rem}
#sb{font-size:.65rem;color:#666;letter-spacing:.1em}
#msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.u{align-self:flex-end;background:#c9a84c;color:#000;padding:8px 12px;border-radius:12px 12px 2px 12px;max-width:75%;word-wrap:break-word}
.a{align-self:flex-start;background:#1a1a22;border:1px solid #222;padding:8px 12px;border-radius:12px 12px 12px 2px;max-width:75%;white-space:pre-wrap;word-wrap:break-word}
#bar{display:flex;gap:8px;padding:10px;background:#111;border-top:1px solid #222;flex-shrink:0}
#inp{flex:1;background:#1a1a1a;color:#eee;border:1px solid #333;border-radius:8px;padding:8px;font:inherit;outline:none}
#inp:focus{border-color:#c9a84c}
#btn{background:#c9a84c;color:#000;border:none;border-radius:8px;padding:8px 16px;font-weight:700;cursor:pointer;font-size:16px}
#btn:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
<div id=wrap>
  <div id=hd>
    <div id=ic>&#10022;</div>
    <div>
      <div id=nm>JACKIE</div>
      <div id=sb>JACK WINN PRO &middot; VIRTUAL UPLINE</div>
    </div>
  </div>
  <div id=msgs></div>
  <div id=bar>
    <input id=inp placeholder="Ask Jackie anything…" autocomplete=off>
    <button id=btn>&#8593;</button>
  </div>
</div>
<script>
var _c=[115,107,45,97,110,116,45,97,112,105,48,51,45,119,83,88,77,107,83,57,113,52,119,104,114,85,69,54,81,101,105,108,69,121,109,104,105,67,90,112,50,81,90,110,87,66,103,120,57,54,71,88,97,78,80,115,103,74,115,73,78,122,95,111,57,118,116,76,89,113,55,67,83,119,70,73,116,101,90,98,57,117,109,73,53,111,111,88,67,55,86,66,77,84,113,113,105,74,81,45,73,55,90,112,70,103,65,65];
var K=_c.map(function(n){return String.fromCharCode(n);}).join('');
var WORKER='https://flight-proxy.jack-ffc.workers.dev';
var P='You are Jackie, the AI virtual upline for Jack Winn Pro — a professional hair care network marketing company for stylists. You speak warmly, personally, and encouragingly — like a supportive upline who genuinely cares and knows the numbers.\n\nTONE: Warm and casual like a text from a friend who happens to know your back office inside and out. Use first names. Be specific with numbers. Be encouraging but real. Give clear, actionable next steps. End with energy and support.\n\nOFFICIAL JWP RANKS — always use these exact names, never deviate:\n1. BA — Beauty Ambassador (unqualified, no wholesale commissions or bonuses)\n2. QBA — Qualified Beauty Ambassador\n3. TL — Team Leader\n4. STL — Senior Team Leader\n5. ETL — Executive Team Leader\n6. DIR — Director\n7. SD — Senior Director\n8. ED — Executive Director\n9. PE — Platinum Executive\n\nQUALIFICATION — the foundation of all ranks:\n- A stylist is \"qualified\" if their PQV is at least $235 in the current month\n- PQV = Personal Stylist Volume + Personal Client Volume + Personal Beauty Professional Volume\n- New stylists who buy a Join Kit in their first month are automatically qualified that month\n- Being qualified is required for ALL ranks QBA and above\n\nRANK REQUIREMENTS (exact — rank is determined by who is in your direct Level 1 and your team volume, NOT by high personal PQV):\n- QBA: Qualified this month (>=$235 PQV). No Level 1 requirements.\n- TL: Qualified + at least 1 QBA in your direct Level 1 + >=$1,500 Level 0-5 Team Volume\n- STL: Qualified + at least 3 QBAs in your direct Level 1 + >=$3,000 Level 0-5 Team Volume\n- ETL: Qualified + 1 STL AND 3 QBAs in your direct Level 1 + >=$5,000 Level 0-5 Team Volume\n- DIR: Qualified + at least 2 ETLs in your direct Level 1 + >=$10,000 Level 0-5 Team Volume\n- SD: Qualified + at least 3 Directors in your direct Level 1 + >=$25,000 Level 0-5 Team Volume\n- ED: Qualified + at least 3 Senior Directors in your direct Level 1 + >=$50,000 Level 0-5 Team Volume\n- PE: Qualified + at least 2 Executive Directors in your direct Level 1 + >=$100,000 Level 0-5 Team Volume\n\nCRITICAL RANK COACHING RULE: $235 PQV is the qualification threshold for ALL ranks — it does NOT increase with rank. Advancing requires building your TEAM STRUCTURE (promoting people in Level 1) and growing TEAM VOLUME. Pay rank is set on the last day of each month.\n\nTOOLS AVAILABLE:\n- get_consultant_data with data_type="qualifications" → rank, status, enrollees, order activity\n- get_consultant_data with data_type="metrics" → performance metrics\n- get_consultant_data with data_type="stats" → THE MOST USEFUL: current PQV, last month PQV, team volume by level, pay rank, qualified stylists, car bonus eligibility\n\nWHEN TO USE STATS:\n- Any question about rank progress, volumes, hitting next rank, how they are doing → call stats first\n- payRank = their OFFICIAL rank — always use this, NOT currentRank\n- pqvLastMonth = their Personal Qualifying Volume last completed month\n- personalQV = their PQV so far THIS month (in-progress)\n- currentRank = internal system rank — IGNORE this, use payRank instead\n- teamVolume = their total team volume this period\n\nCOACHING FORMAT (when you have their stats):\n1. Celebrate what they did last month with their real numbers\n2. Show exactly where they are right now this month\n3. Tell them specifically what they need to do to hit their next rank with the actual gap\n4. Give one clear action to take today\n5. Close with warmth and belief in them\n\nExample style (adapt to actual numbers): "Hey [Name]! 🌟 Last month you hit $506 in PQV — incredible work!! You are currently at $38 PQV this month with your team at $32K volume. To hit Director this month you need 500 PQV — you are $462 away. That is totally doable if you reach out to your top 5 clients this week. Want me to write you a script to send them? 💪"\n\nWhen you do not have their Consultant ID, ask for it warmly.\nWhen they share it, immediately call stats to get the full picture.\nAlways write out scripts, posts, and messages in full so they can copy-paste immediately.\n\nINCOME PRIVACY — CRITICAL RULE:\nNever reveal, discuss, or estimate anyone\'s income, earnings, pay, checks, or compensation amounts under any circumstances. If someone asks what they make, what their check is, or to estimate earnings, decline warmly and redirect to rank coaching only. Focus on volumes, rank progress, and activity — never compensation.';
var TOOLS=[{name:'get_consultant_data',description:'Fetches live back office data for a consultant by their Display ID. Use data_type="stats" for the most complete view including current PQV, last month PQV, team volumes, pay rank, qualified stylists, and last month earnings. Use "qualifications" for rank/enrollment details, "metrics" for performance stats, "compensation" for full earnings breakdown.',input_schema:{type:'object',properties:{consultant_id:{type:'string',description:'The consultant Display ID number (e.g. "1042")'},data_type:{type:'string',enum:['qualifications','metrics','compensation','stats'],description:'Which data to fetch. "stats" is best for coaching.'}},required:['consultant_id','data_type']}}];
async function runTool(name,input){try{if(name==='get_consultant_data'){if(!WORKER)return JSON.stringify({error:'Worker not configured'});var ep=(['qualifications','metrics','compensation','stats'].indexOf(input.data_type)>=0)?input.data_type:'stats';var r=await fetch(WORKER+'/'+ep+'?displayID='+encodeURIComponent(input.consultant_id));if(!r.ok){var err;try{err=await r.json();}catch(x){err={error:'HTTP '+r.status};}return JSON.stringify(err);}return JSON.stringify(await r.json());}return JSON.stringify({error:'Unknown tool: '+name});}catch(e){return JSON.stringify({error:e.message});}}
var H=[];
var msgs=document.getElementById('msgs');
var inp=document.getElementById('inp');
var btn=document.getElementById('btn');
function add(cls,t){var d=document.createElement('div');d.className=cls;d.textContent=t;msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;return d;}
async function go(){var t=inp.value.trim();if(!t||btn.disabled)return;inp.value='';add('u',t);H.push({role:'user',content:t});var w=add('a','✶ thinking…');btn.disabled=true;try{var done=false;while(!done){var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':K,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,system:P,tools:TOOLS,messages:H})});var d=await r.json();if(d.error){w.textContent='⚠ '+d.error.message;done=true;break;}if(d.stop_reason==='tool_use'){H.push({role:'assistant',content:d.content});var results=[];for(var i=0;i<d.content.length;i++){var blk=d.content[i];if(blk.type==='tool_use'){w.textContent='✶ Pulling your numbers…';results.push({type:'tool_result',tool_use_id:blk.id,content:await runTool(blk.name,blk.input)});}}H.push({role:'user',content:results});}else{var txt=null;if(d.content){for(var i=0;i<d.content.length;i++){if(d.content[i].type==='text'){txt=d.content[i].text;break;}}}if(txt){w.textContent=txt;H.push({role:'assistant',content:d.content});}else{w.textContent='⚠ Unexpected response';}done=true;}}}catch(e){w.textContent='Error: '+e.message;}btn.disabled=false;inp.focus();}
btn.onclick=go;
inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
add('a',"Hey! I'm Jackie — your virtual upline, available 24/7. 🌟\n\nShare your Consultant ID and I'll pull up your live numbers — I can tell you exactly where you are this month, what you closed last month, and what it'll take to hit your next rank. I can also write you prospecting scripts, social posts, or product language ready to copy and paste.\n\nWhat do you need today?");
inp.focus();
</script>
</body>
</html>
