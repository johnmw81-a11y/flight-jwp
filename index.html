async function runTool(name,input){
  try{
    if(name==='get_consultant_data'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      const r=await fetch(WORKER+'/consultant?displayID='+encodeURIComponent(input.display_id));
      if(!r.ok)return JSON.stringify({error:'HTTP '+r.status});
      return await r.text();
    }
    if(name==='get_order_history'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      const r=await fetch(WORKER+'/orders?displayID='+encodeURIComponent(input.display_id));
      if(!r.ok)return JSON.stringify({error:'HTTP '+r.status});
      return await r.text();
    }
    if(name==='get_order_lines'){
      if(!WORKER)return JSON.stringify({error:'Worker URL not set'});
      let u=WORKER+'/order-lines?displayID='+encodeURIComponent(input.consultant_id);
      if(input.keyword)u+='&keyword='+encodeURIComponent(input.keyword);
      const r=await fetch(u);
      const j=await r.json();
      if(j.session_expired)return JSON.stringify({session_expired:true});
      return JSON.stringify(j);
    }
    return JSON.stringify({error:'Unknown tool: '+name});
  }catch(e){return JSON.stringify({error:e.message});}
}

  var escaped=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
